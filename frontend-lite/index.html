<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegalOps Dashboard</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <nav class="sidebar glass-effect">
            <div class="logo">
                <span class="material-icons-round logo-icon">gavel</span>
                <h1>LegalOps</h1>
            </div>
            <ul class="nav-links">
                <li><a href="#" id="nav-dashboard" class="active"><span class="material-icons-round">dashboard</span> Dashboard</a></li>
                <li><a href="#" id="nav-cases"><span class="material-icons-round">folder_open</span> Legal Cases</a></li>
                <li><a href="#" id="nav-clients"><span class="material-icons-round">people</span> Clients</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header glass-effect">
                <h2 id="page-title">Dashboard</h2>
                <div class="user-profile">
                    <span class="material-icons-round">account_circle</span>
                    <span class="user-name">Admin</span>
                </div>
            </header>

            <div class="content-container" id="app-content">
                <!-- Dynamic content will be loaded here by app.js -->
                <div class="loading-spinner"></div>
            </div>
        </main>
    </div>

    <!-- Modal for Forms -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal glass-effect" id="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Title</h3>
                <button id="modal-close" class="icon-btn"><span class="material-icons-round">close</span></button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Form goes here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
