<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documents | Legal Case Management System</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="documents">
    <div class="layout">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="content-shell">
        <header class="topbar">
          <h1>Legal Case Management System</h1>
        </header>
        <main class="page fade-in">
          <section class="panel">
            <div class="panel-header"><h2>Documents</h2></div>
            <form id="document-form" class="inline-form">
              <input id="document-name" class="input" placeholder="Document name" required />
              <input id="document-type" class="input" placeholder="Document type" required />
              <button class="btn" type="submit">Add to List</button>
            </form>
            <p id="documents-status" class="status"></p>
            <div id="documents-list" class="list-block"></div>
          </section>
        </main>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/documents.js"></script>
  </body>
</html>
