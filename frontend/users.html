<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users | Legal Case Management System</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="users">
    <div class="layout">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="content-shell">
        <header class="topbar">
          <h1>Legal Case Management System</h1>
        </header>
        <main class="page fade-in">
          <section class="panel">
            <div class="panel-header split">
              <h2>Users</h2>
              <input id="user-search" class="input" type="search" placeholder="Search users" />
            </div>
            <p id="users-status" class="status"></p>
            <div id="users-table-wrap" class="table-wrap"></div>
            <div id="users-cards" class="cards-grid"></div>
          </section>
        </main>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/users.js"></script>
  </body>
</html>
