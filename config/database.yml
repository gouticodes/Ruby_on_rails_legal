default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch('RAILS_MAX_THREADS', 5) %>
  url: <%= ENV['DATABASE_URL'] %>

development:
  <<: *default
  url: <%= ENV.fetch('DATABASE_URL', 'postgresql://postgres:postgres@localhost:5432/legal_app_development') %>

test:
  <<: *default
  url: <%= ENV.fetch('DATABASE_URL', 'postgresql://postgres:postgres@localhost:5432/legal_app_test') %>

production:
  <<: *default
